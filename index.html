<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil</title>
  <style>
    body { background-color: #0d0d0d; color: white; font-family: sans-serif; text-align: center; }
    
    .btn-follow {
      background-color: #fe2c55;
      color: white;
      border: none;
      padding: 10px 40px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Modal emergente */
    .modal {
      display: none; /* Oculto por defecto */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 8px;
      position: relative;
      width: 90%;
      max-width: 400px;
    }

    .close-btn {
      position: absolute;
      top: 10px; right: 15px;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 350px;
      border: none;
    }
  </style>
</head>
<body>

  <h2>@carlitooamarante68</h2>
  
  <button class="btn-follow" onclick="abrirFormulario()">Seguir</button>

  <div id="modalFormulario" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="cerrarFormulario()">&times;</span>
      <iframe src="formulario.html"></iframe>
    </div>
  </div>

  <script>
    function abrirFormulario() {
      document.getElementById('modalFormulario').style.display = 'flex';
    }

    function cerrarFormulario() {
      document.getElementById('modalFormulario').style.display = 'none';
    }
  </script>

</body>
</html>
